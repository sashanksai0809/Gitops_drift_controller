apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: default
  annotations:
    # Allow HPA to manage replicas without being flagged as drift.
    drift.gitops.io/ignore-fields: "spec.replicas"
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
